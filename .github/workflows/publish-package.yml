name: Publish Package

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to publish
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: read
  attestations: write
  id-token: write

concurrency:
  group: publish-${{ inputs.tag_name || github.event.release.tag_name }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Verify release version
        shell: bash
        run: |
          version="$(dotnet msbuild src/SharpCompress/SharpCompress.csproj -getProperty:Version)"
          test "${RELEASE_TAG}" = "v${version}"

      - name: Restore locked dependencies
        run: dotnet restore SharpCompress.slnx --locked-mode

      - name: Build
        run: dotnet build SharpCompress.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/SharpCompress.Test/SharpCompress.Test.csproj --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/SharpCompress/SharpCompress.csproj --configuration Release --no-build --output artifacts

      - name: Validate package contents
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import zipfile

          packages = glob.glob("artifacts/*.nupkg")
          symbols = glob.glob("artifacts/*.snupkg")
          assert len(packages) == 1, packages
          assert len(symbols) == 1, symbols

          with zipfile.ZipFile(packages[0]) as package:
              names = set(package.namelist())
              assert {
                  "lib/net10.0/SharpCompress.dll",
                  "README.md",
                  "LICENSE.txt",
                  "CHANGELOG.md",
              } <= names, sorted(names)

          with zipfile.ZipFile(symbols[0]) as symbol_package:
              assert "lib/net10.0/SharpCompress.pdb" in symbol_package.namelist()
          PY

      - name: Upload release packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-${{ env.RELEASE_TAG }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Attest package provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/*

      - name: Log in to NuGet.org
        uses: NuGet/login@ebc737b6fc418a6ca0073cf116ec8dc156d8b81e # v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        run: dotnet nuget push "artifacts/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --skip-duplicate
