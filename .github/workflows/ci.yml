name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check async partial-class pair drift
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git fetch --no-tags --depth=1 origin "${BASE_SHA}"
          scripts/check-async-pairs.sh

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore locked dependencies
        run: dotnet restore SharpCompress.slnx --locked-mode

      - name: Build
        run: dotnet build SharpCompress.slnx --configuration Release --no-restore

      - name: Verify formatting
        run: dotnet csharpier check .

      - name: Run tests
        run: dotnet test tests/SharpCompress.Test/SharpCompress.Test.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --collect "XPlat Code Coverage"

      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: "**/TestResults/**"
          if-no-files-found: warn
          retention-days: 7

      - name: Pack
        run: dotnet pack src/SharpCompress/SharpCompress.csproj --configuration Release --no-build --output artifacts

      - name: Validate package contents
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import zipfile

          packages = glob.glob("artifacts/*.nupkg")
          symbols = glob.glob("artifacts/*.snupkg")
          assert len(packages) == 1, packages
          assert len(symbols) == 1, symbols

          with zipfile.ZipFile(packages[0]) as package:
              names = set(package.namelist())
              assert {
                  "lib/net10.0/SharpCompress.dll",
                  "README.md",
                  "LICENSE.txt",
                  "CHANGELOG.md",
              } <= names, sorted(names)

          with zipfile.ZipFile(symbols[0]) as symbol_package:
              assert "lib/net10.0/SharpCompress.pdb" in symbol_package.namelist()
          PY

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7
